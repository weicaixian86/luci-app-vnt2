name: Build luci-app-vnt2 for OpenWrt 24.10 x86_64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        default: "v2.0.0"
      release_description:
        description: "Release description"
        required: false
        default: ""

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  OPENWRT_VERSION: "24.10.0"
  OPENWRT_TARGET: "x86/64"
  SDK_URL: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
  PACKAGE_NAME: "luci-app-vnt2"
  PACKAGE_DIR: "luci-app-vnt2"

jobs:
  build:
    name: Build and Release IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set build time
        shell: bash
        run: |
          echo "BUILD_TIME=$(date '+%Y-%m-%d %H:%M:%S %Z')" >> "$GITHUB_ENV"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib \
            genisoimage gettext git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
            libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lrzsz mkisofs msmtp nano ninja-build p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-docutils qemu-utils rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          wget -q -O openwrt-sdk.tar.zst "$SDK_URL"
          mkdir -p sdk
          tar --zstd -xf openwrt-sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare feeds
        shell: bash
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Link package into SDK
        shell: bash
        run: |
          test -d "$GITHUB_WORKSPACE/${PACKAGE_DIR}"
          test -f "$GITHUB_WORKSPACE/${PACKAGE_DIR}/Makefile"
          cd sdk
          mkdir -p package/custom
          ln -sfn "$GITHUB_WORKSPACE/${PACKAGE_DIR}" "package/custom/${PACKAGE_NAME}"
          test -f "package/custom/${PACKAGE_NAME}/Makefile"

      - name: Apply package version from release tag
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.release_tag }}"
          VERSION="${VERSION#v}"
          VERSION="${VERSION#V}"
          test -n "$VERSION"
          sed -i -E "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" "$GITHUB_WORKSPACE/${PACKAGE_DIR}/Makefile"
          grep -E "^PKG_NAME:=|^PKG_VERSION:=|^PKG_RELEASE:=" "$GITHUB_WORKSPACE/${PACKAGE_DIR}/Makefile"

      - name: Generate defconfig
        shell: bash
        run: |
          cd sdk
          make defconfig

      - name: Build package
        shell: bash
        run: |
          cd sdk
          make package/${PACKAGE_NAME}/compile V=s -j"$(nproc)"

      - name: Collect IPK files
        shell: bash
        run: |
          mkdir -p output
          find sdk/bin/packages -type f -name "${PACKAGE_NAME}_*.ipk" -exec cp -f {} output/ \;
          test -n "$(find output -maxdepth 1 -type f -name '*.ipk')"
          ls -lah output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-24.10-x86_64-ipk
          path: output/*.ipk
          if-no-files-found: error

      - name: Remove existing release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: ${{ github.event.inputs.release_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          body: |
            ${{ github.event.inputs.release_description }}

            编译时间: ${{ env.BUILD_TIME }}
          files: output/*.ipk
          generate_release_notes: false
          append_body: false
          make_latest: true
