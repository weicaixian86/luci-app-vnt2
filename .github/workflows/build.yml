name: Build VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布Releases的版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '发布的说明'
        required: false
        default: ''
env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai
  SDK_VERSION: "23.05.0"
  SDK_URL: "https://downloads.openwrt.org/releases/23.05.0/targets/x86/64/openwrt-sdk-23.05.0-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
permissions:
  contents: write
jobs:
  build:
    name: Build x86-64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and extract OpenWrt SDK
        run: |
          wget -q "${{ env.SDK_URL }}" -O openwrt-sdk.tar.xz
          mkdir -p sdk
          tar -xJf openwrt-sdk.tar.xz -C sdk --strip-components=1
          ls -la sdk/

      - name: Prepare feeds and install package
        run: |
          cd sdk
          ./scripts/feeds update -a
          mkdir -p package/feeds/vnt2
          ln -sf $GITHUB_WORKSPACE/luci-app-vnt2 package/feeds/vnt2/luci-app-vnt2
          ./scripts/feeds install luci-app-vnt2

      - name: Configure package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-vnt2/compile V=s

      - name: Find and copy ipk files
        run: |
          mkdir -p output
          find sdk/bin -name "luci-app-vnt2*.ipk" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-x86-64-23.05
          path: output/

      - name: Create compress files
        if: ${{ github.event.inputs.tag != '' }}
        run: |
          zip -j vnt2-x86-64-23.05.zip output/*
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |
             > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.TAG }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github) 

             - 其中 **`openwrt-23.05`** 里面是ipk安装包

             - 需要先去系统自带的软件包里已经安装 **_luci_** 和 **_luci-base_** 和 **_luci-compat_** 和 **_kmod-tun_** 再安装这个ipk才能显示界面

             - 安装完成后找不到界面入口的，请注销登录关闭当前浏览器窗口重新打开或重启路由器

             ${{ github.event.inputs.text }}

            tag_name: ${{ env.TAG }}
            files: vnt2-x86-64-23.05.zip
