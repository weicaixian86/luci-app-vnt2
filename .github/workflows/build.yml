name: Build VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布Releases的版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '发布的说明'
        required: false
        default: ''
env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - aarch64_generic
        sdk:
          - openwrt-23.05

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Building packages
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: vnt2
          PACKAGES: luci-app-vnt2
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/vnt2/

      - name: Create compress files
        run: |
          zip -j vnt2-${{ matrix.arch }}-${{ matrix.sdk }}.zip bin/packages/${{ matrix.arch }}/vnt2/*
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |
             > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.TAG }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github) 

             - 其中 **`openwrt-23.05`** 里面是ipk安装包

             - 需要先去系统自带的软件包里已经安装 **_luci_** 和 **_luci-base_** 和 **_luci-compat_** 和 **_kmod-tun_** 再安装这个ipk才能显示界面

             - 安装完成后找不到界面入口的，请注销登录关闭当前浏览器窗口重新打开或重启路由器

             ${{ github.event.inputs.text }}

            tag_name: ${{ env.TAG }}
            files: vnt2-${{ matrix.arch }}-${{ matrix.sdk }}.zip
