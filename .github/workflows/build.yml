name: Build luci-app-vnt2 for OpenWrt x86_64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag"
        required: true
        default: "v2.0.0"
      release_description:
        description: "Release description"
        required: false
        default: ""

permissions:
  contents: write

env:
  TZ: Asia/Shanghai
  PACKAGE_NAME: "luci-app-vnt2"
  OPENWRT_TARGET: "x86/64"

jobs:
  build:
    name: Build ${{ matrix.package_format }} for OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: "24.10.0"
            sdk_url: "https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            package_format: "ipk"
          - openwrt_version: "25.12.0"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            package_format: "apk"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib \
            genisoimage gettext git gperf haveged help2man intltool libc6-dev-i386 libelf-dev \
            libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lrzsz mkisofs msmtp nano ninja-build p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-docutils qemu-utils rsync scons squashfs-tools subversion swig \
            texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Detect package source dir
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/Makefile" ] && grep -q "^PKG_NAME:=${PACKAGE_NAME}$" "$GITHUB_WORKSPACE/Makefile"; then
            APP_SOURCE_DIR="."
          elif [ -f "$GITHUB_WORKSPACE/${PACKAGE_NAME}/Makefile" ] && grep -q "^PKG_NAME:=${PACKAGE_NAME}$" "$GITHUB_WORKSPACE/${PACKAGE_NAME}/Makefile"; then
            APP_SOURCE_DIR="${PACKAGE_NAME}"
          elif [ -f "$GITHUB_WORKSPACE/luci-app-vnt2/Makefile" ] && grep -q "^PKG_NAME:=${PACKAGE_NAME}$" "$GITHUB_WORKSPACE/luci-app-vnt2/Makefile"; then
            APP_SOURCE_DIR="luci-app-vnt2"
          elif [ -f "$GITHUB_WORKSPACE/luci-app-vnt2/${PACKAGE_NAME}/Makefile" ] && grep -q "^PKG_NAME:=${PACKAGE_NAME}$" "$GITHUB_WORKSPACE/luci-app-vnt2/${PACKAGE_NAME}/Makefile"; then
            APP_SOURCE_DIR="luci-app-vnt2/${PACKAGE_NAME}"
          else
            echo "Unable to locate package source directory"
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -name Makefile | sort
            exit 1
          fi
          echo "APP_SOURCE_DIR=$APP_SOURCE_DIR" >> "$GITHUB_ENV"
          echo "Resolved APP_SOURCE_DIR=$APP_SOURCE_DIR"

      - name: Apply package version from release tag
        shell: bash
        run: |
          RAW_TAG="${{ github.event.inputs.release_tag }}"
          VERSION="${RAW_TAG#v}"
          VERSION="${VERSION#V}"
          test -n "$RAW_TAG"
          test -n "$VERSION"
          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i -E "s/^PKG_VERSION:=.*/PKG_VERSION:=${VERSION}/" "$GITHUB_WORKSPACE/${APP_SOURCE_DIR}/Makefile"
          grep -E "^PKG_NAME:=|^PKG_VERSION:=|^PKG_RELEASE:=" "$GITHUB_WORKSPACE/${APP_SOURCE_DIR}/Makefile"

      - name: Download OpenWrt SDK
        shell: bash
        run: |
          wget -q -O openwrt-sdk.tar.zst "${{ matrix.sdk_url }}"
          mkdir -p sdk
          tar --zstd -xf openwrt-sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare feeds
        shell: bash
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Link package into SDK
        shell: bash
        run: |
          test -n "${APP_SOURCE_DIR}"
          test -d "$GITHUB_WORKSPACE/${APP_SOURCE_DIR}"
          test -f "$GITHUB_WORKSPACE/${APP_SOURCE_DIR}/Makefile"
          cd sdk
          rm -rf "package/${PACKAGE_NAME}"
          cp -a "$GITHUB_WORKSPACE/${APP_SOURCE_DIR}" "package/${PACKAGE_NAME}"
          test -f "package/${PACKAGE_NAME}/Makefile"

      - name: Generate defconfig
        shell: bash
        run: |
          cd sdk
          make defconfig

      - name: Build package
        shell: bash
        run: |
          set -o pipefail
          cd sdk
          make package/${PACKAGE_NAME}/compile V=sc -j"$(nproc)" 2>&1 | tee "build-${PACKAGE_NAME}-${{ matrix.package_format }}.log"

      - name: Dump package build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "===== build-${PACKAGE_NAME}-${{ matrix.package_format }}.log ====="
          test -f "sdk/build-${PACKAGE_NAME}-${{ matrix.package_format }}.log" && tail -n 500 "sdk/build-${PACKAGE_NAME}-${{ matrix.package_format }}.log" || true
          echo "===== possible package logs ====="
          find sdk/build_dir -type f \( -name "*.log" -o -name "config.err" -o -name "CMakeError.log" -o -name "CMakeOutput.log" \) | sort || true

      - name: Collect package file
        shell: bash
        run: |
          mkdir -p output
          mapfile -t package_files < <(find sdk/bin/packages -type f \( -name "${PACKAGE_NAME}_*.${{ matrix.package_format }}" -o -name "${PACKAGE_NAME}-*.${{ matrix.package_format }}" \) | sort)
          test "${#package_files[@]}" -eq 1
          cp -f "${package_files[0]}" "output/${PACKAGE_NAME}_${RAW_TAG}.${{ matrix.package_format }}"
          ls -lah output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.openwrt_version }}-x86_64-${{ matrix.package_format }}
          path: output/*.${{ matrix.package_format }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Set release metadata
        shell: bash
        run: |
          BUILD_TIME="$(date '+%Y-%m-%d %H:%M:%S %Z')"
          RELEASE_DESCRIPTION="${{ github.event.inputs.release_description }}"
          echo "BUILD_TIME=$BUILD_TIME" >> "$GITHUB_ENV"
          {
            echo "RELEASE_BODY<<EOF"
            printf '编译时间: %s\n' "$BUILD_TIME"
            if [ -n "$RELEASE_DESCRIPTION" ]; then
              printf '\n%s\n' "$RELEASE_DESCRIPTION"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
          ls -lah release-assets

      - name: Remove existing release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: ${{ github.event.inputs.release_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            release-assets/*.ipk
            release-assets/*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
          append_body: false
          make_latest: true
