name: Build luci-app-vnt2 for X86

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  LUCI_VERSION: "24.10"
  APP_NAME: "luci-app-vnt2"

jobs:
  build-x86:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Prepare Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get -y install build-essential clang flex g++ gettext libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev pkg-config
      
      - name: Clone OpenWrt SDK
        run: |
          mkdir -p openwrt-sdk
          cd openwrt-sdk
          wget -q https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz --strip-components=1
          rm -f openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
      
      - name: Prepare Package
        run: |
          cd openwrt-sdk
          mkdir -p package/luci-app-vnt2
          cp -r ../luci-app-vnt2/* package/luci-app-vnt2/
          
      - name: Update Feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p luci
      
      - name: Configure
        run: |
          cd openwrt-sdk
          make defconfig
          make menuconfig
          # Select luci-app-vnt2
          sed -i 's/^# CONFIG_PACKAGE_luci-app-vnt2 is not set/CONFIG_PACKAGE_luci-app-vnt2=y/' .config
          make defconfig
      
      - name: Build
        run: |
          cd openwrt-sdk
          make -j$(nproc) V=s CONFIG_PACKAGE_luci-app-vnt2=y 2>&1 | tee build.log
      
      - name: Check Build Result
        run: |
          cd openwrt-sdk
          if [ -f bin/packages/x86_64/luci/luci-app-vnt2_*.ipk ]; then
            echo "Build successful!"
            ls -la bin/packages/x86_64/luci/luci-app-vnt2_*.ipk
          else
            echo "Build failed!"
            cat build.log | tail -100
            exit 1
          fi
      
      - name: Prepare Artifacts
        run: |
          cd openwrt-sdk
          mkdir -p artifacts
          cp bin/packages/x86_64/luci/luci-app-vnt2_*.ipk artifacts/
          # Get build time
          date +"%Y-%m-%d %H:%M:%S" > artifacts/build_time.txt
          echo "Build completed at: $(cat artifacts/build_time.txt)"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-vnt2-x86-ipk
          path: |
            openwrt-sdk/artifacts/*.ipk
            openwrt-sdk/artifacts/build_time.txt
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            openwrt-sdk/artifacts/*.ipk
          body: |
            ## luci-app-vnt2 Release
            
            **Build Time:** $(cat openwrt-sdk/artifacts/build_time.txt)
            
            ### Installation
            Upload the .ipk file to your OpenWrt 24.10 device and install:
            ```bash
            opkg install luci-app-vnt2_*.ipk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
