name: Build VNT2 IPK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 unzip python3-pyelftools \
          python3-setuptools python3-wheel rsync subversion swig time xsltproc \
          zlib1g-dev

      - name: Build OpenWrt SDK
        run: |
          # 下载OpenWrt SDK
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          cd openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64
          
          # 添加feeds
          echo "src-git luci https://github.com/openwrt/luci.git;openwrt-23.05" > feeds.conf
          echo "src-git packages https://github.com/openwrt/packages.git;openwrt-23.05" >> feeds.conf
          
          # 更新feeds
          ./scripts/feeds update -a
          
          # 安装feeds
          ./scripts/feeds install -a
          
          # 配置编译环境
          export TERM=xterm
          export TERMINFO=/usr/share/terminfo
          
          # 创建配置文件
          cat > .config << EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_ARCH_PACKAGES="x86_64"
          CONFIG_USE_MUSL=y
          CONFIG_TARGET_OPTIMIZATION="-O2 -pipe -fno-caller-saves -fno-plt"
          CONFIG_TARGET_SUFFIX=musl
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_LUCI_LANG_en=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-lib-ip=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-app-vnt2=y
          EOF
          
          make defconfig
          
          # 复制luci-app-vnt2到package目录
          mkdir -p package/feeds/luci
          cp -r ${{ github.workspace }}/luci-app-vnt2 package/feeds/luci/
          
          # 删除有问题的包
          rm -rf feeds/luci/contrib/package/lucihttp
          rm -rf feeds/luci/libs/rpcd-mod-luci
          rm -rf feeds/luci/contrib/package/ucode-mod-html
          rm -rf feeds/luci/contrib/package/ucode-mod-lua
          rm -rf feeds/packages/net/cgi-io
          rm -rf feeds/packages/lang/python/python3
          
          # 直接编译luci-app-vnt2
          make package/luci-app-vnt2/compile V=s IGNORE_ERRORS=1
          
          # 查找生成的ipk文件
          find ./bin/packages -name "luci-app-vnt2*.ipk" -exec cp {} ${{ github.workspace }} \;
          
      - name: Get Build Time
        id: time
        run: echo "time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: luci-app-vnt2*.ipk
          body: |
            编译时间: ${{ steps.time.outputs.time }}
          tag_name: ${{ github.event.inputs.version || 'latest' }}
          name: VNT2 ${{ github.event.inputs.version || 'latest' }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
