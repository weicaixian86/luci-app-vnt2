name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: ''

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom feed
        run: |
          mkdir -p custom-feed
          cp -r ./vnt2 custom-feed/
          cp -r ./vnts2 custom-feed/
          cp -r ./luci-app-vnt2 custom-feed/
          ls -la custom-feed/

      # 直接用 openwrt/gh-action-sdk，把 FEED_CONF 当环境变量传
      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v6
        env:
          ARCH: x86-64-24.10.5
          FEED_CONF: |
            src/gz openwrt_core https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/packages
            src/gz openwrt_base https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/base
            src/gz openwrt_luci https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/luci
            src/gz openwrt_packages https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/packages
            src/gz openwrt_routing https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/routing
            src/gz openwrt_telephony https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/telephony
            src-link custom_feed $GITHUB_WORKSPACE/custom-feed
          FEEDNAME: custom_feed
          PACKAGES: vnt2 vnts2 luci-app-vnt2
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-x86_64-24.10.5
          path: bin/packages/x86_64/custom_feed/
