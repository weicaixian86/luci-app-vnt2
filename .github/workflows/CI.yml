name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: ''

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 修正：OpenWrt 容器标签用 x86-64 而不是 x86_64
        arch:
          - x86-64
        sdk_version:
          - "24.10"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom feed
        run: |
          mkdir -p custom-feed
          cp -r ./luci-app-vnt2/* custom-feed/
          ls -la custom-feed/

      - name: Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v6
        env:
          # 修正：ARCH 变量也改为 x86-64-24.10
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk_version }}
          FEED_CONF: |
            src/gz openwrt_core https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/targets/x86/64/packages
            src/gz openwrt_base https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/x86_64/packages/base
            src/gz openwrt_luci https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/x86_64/packages/luci
            src/gz openwrt_packages https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/x86_64/packages/packages
            src/gz openwrt_routing https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/x86_64/packages/routing
            src/gz openwrt_telephony https://downloads.openwrt.org/releases/${{ matrix.sdk_version }}/x86_64/packages/telephony
            src-link custom_feed $GITHUB_WORKSPACE/custom-feed
          FEEDNAME: custom_feed
          PACKAGES: vnt2 vnts2 luci-app-vnt2
          NO_REFRESH_CHECK: true
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-${{ matrix.arch }}-${{ matrix.sdk_version }}
          path: bin/packages/${{ matrix.arch }}/custom_feed/
