name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布版本号（留空不发布）'
        required: false
        default: ''
      text:
        description: '发布说明'
        required: false
        default: ''
env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai
  # 锁定SDK版本，避免main分支变动导致兼容问题
  SDK_ACTION_VERSION: v5
permissions:
  contents: write

jobs:
  # 第一步：编译核心架构（高优先级，覆盖80%用户）
  build_core:
    name: Core Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    continue-on-error: true  # 单架构失败不终止
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic      # ARM64通用
          - mipsel_24kc          # 主流MT7621路由器
          - x86_64               # x86软路由
        sdk:
          - openwrt-23.05        # 稳定版
          - openwrt-24.10        # 新版

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix File Permissions
        run: |
          sudo chown -R $USER:$USER .
          sudo chmod -R 755 .

      - name: Preinstall Dependencies
        run: |
          # 适配24.10 SDK依赖
          sudo apt update && sudo apt install -y \
            build-essential libncurses5-dev libssl-dev \
            git wget curl rsync unzip zip jq

      - name: Build OpenWRT Packages
        id: build
        uses: sbwml/openwrt-gh-action-sdk@${{ env.SDK_ACTION_VERSION }}
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: vnt vnts luci-app-vnt2
          NO_REFRESH_CHECK: true
          V: s  # 详细日志

      - name: Save Build Log
        if: always()  # 无论成功失败都保存日志
        run: |
          mkdir -p build_logs
          cp -r logs build_logs/${{ matrix.arch }}-${{ matrix.sdk }}.log || true
          echo "Build log saved to build_logs/"

      - name: Verify IPK Package
        if: steps.build.outcome == 'success'
        run: |
          IPK_PATH="bin/packages/${{ matrix.arch }}/packages_ci/luci-app-vnt2*.ipk"
          if [ ! -f $IPK_PATH ]; then
            echo "Error: luci-app-vnt2 IPK not found!"
            ls -l bin/packages/${{ matrix.arch }}/packages_ci/
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-Core-${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/
            build_logs/
          retention-days: 3  # 缩短保留时间

      - name: Compress Packages
        if: steps.build.outcome == 'success'
        run: |
          zip -j vnt2-${{ matrix.arch }}-${{ matrix.sdk }}.zip bin/packages/${{ matrix.arch }}/packages_ci/*
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV

      - name: Release
        if: ${{ github.event.inputs.tag != '' && steps.build.outcome == 'success' }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            > ### 编译时间：${{ env.build_time }} | 下载量：![GitHub Downloads (by Release)](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.TAG }}/total)

            ## luci-app-vnt2 插件（VNT2分支适配）
            - 支持OpenWRT版本：23.05 / 24.10
            - 适配架构：aarch64_generic、mipsel_24kc、x86_64

            ### 安装步骤
            1. 安装依赖：
               ```bash
               opkg update && opkg install luci luci-base luci-compat kmod-tun
