name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: ''

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        sdk:
          - openwrt-24.10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 关键：安装Rust编译环境（V2源码编译必需）
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,armv7-unknown-linux-musleabihf

      # 准备自定义feed结构
      - name: Prepare custom feed structure
        run: |
          mkdir -p custom-feed
          cp -r ./luci-app-vnt2/* custom-feed/
          ls -la custom-feed/

      # 编译（添加RUST_PATH环境变量）
      - name: Building packages
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEED_CONF: |
            src/gz openwrt_core https://downloads.openwrt.org/releases/${{ matrix.sdk }}/targets/${{ matrix.arch }}/packages
            src/gz openwrt_base https://downloads.openwrt.org/releases/${{ matrix.sdk }}/x86_64/packages/base
            src/gz openwrt_luci https://downloads.openwrt.org/releases/${{ matrix.sdk }}/x86_64/packages/luci
            src/gz openwrt_packages https://downloads.openwrt.org/releases/${{ matrix.sdk }}/x86_64/packages/packages
            src/gz openwrt_routing https://downloads.openwrt.org/releases/${{ matrix.sdk }}/x86_64/packages/routing
            src/gz openwrt_telephony https://downloads.openwrt.org/releases/${{ matrix.sdk }}/x86_64/packages/telephony
            src-link custom_feed $GITHUB_WORKSPACE/custom-feed
          FEEDNAME: custom_feed
          PACKAGES: vnt2 vnts2 luci-app-vnt2
          NO_REFRESH_CHECK: true
          V: s
          # 传递Rust环境变量
          RUSTUP_HOME: /usr/local/rustup
          CARGO_HOME: /usr/local/cargo
          PATH: /usr/local/cargo/bin:$PATH

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/custom_feed/
