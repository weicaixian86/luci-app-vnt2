name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: ''

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom feed
        run: |
          mkdir -p custom-feed
          cp -r ./luci-app-vnt2/* custom-feed/
          ls -la custom-feed/  # 验证三个包目录都在

      - name: Download OpenWrt SDK
        run: |
          SDK_FILE="openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/$SDK_FILE
          tar -I zstd -xf $SDK_FILE
          mv openwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64 sdk
          ls -la sdk/

      - name: Configure SDK
        run: |
          cd sdk
          > feeds.conf
          echo "src/gz openwrt_core https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/packages" >> feeds.conf
          echo "src/gz openwrt_base https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/base" >> feeds.conf
          echo "src/gz openwrt_luci https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/luci" >> feeds.conf
          echo "src/gz openwrt_packages https://downloads.openwrt.org/releases/24.10.5/x86_64/packages/packages" >> feeds.conf
          echo "src-link custom_feed $(pwd)/../custom-feed" >> feeds.conf
          cat feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p custom_feed

      - name: Build packages
        run: |
          cd sdk
          make defconfig
          ./scripts/feeds search vnt2
          ./scripts/feeds search vnts2
          ./scripts/feeds search luci-app-vnt2
          make package/vnt2/compile V=s
          make package/vnts2/compile V=s
          make package/luci-app-vnt2/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp sdk/bin/packages/x86_64/custom_feed/*.ipk artifacts/
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-x86_64-24.10.5
          path: artifacts/
