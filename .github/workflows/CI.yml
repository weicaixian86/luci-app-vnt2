name: Build-OpenWrt-VNT2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: false
        default: ''

env:
  TAG: "${{ github.event.inputs.tag }}"
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        sdk_version:
          - "24.10"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Prepare custom feed
        run: |
          mkdir -p custom-feed
          cp -r ./luci-app-vnt2/* custom-feed/
          ls -la custom-feed/

      # ✅ 修复后的 SDK 下载地址
      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10/targets/x86/64/openwrt-sdk-24.10-x86-64_gcc-13.3_musl.Linux-x86_64.tar.xz
          tar xJf openwrt-sdk-24.10-x86-64_gcc-13.3_musl.Linux-x86_64.tar.xz
          mv openwrt-sdk-24.10-x86-64_gcc-13.3_musl.Linux-x86_64 sdk

      - name: Configure SDK
        run: |
          cd sdk
          echo "src-link custom_feed $(pwd)/../custom-feed" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build packages
        run: |
          cd sdk
          make defconfig
          make package/vnt2/compile V=s
          make package/vnts2/compile V=s
          make package/luci-app-vnt2/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp sdk/bin/packages/x86_64/custom_feed/*.ipk artifacts/
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VNT2-${{ matrix.arch }}-${{ matrix.sdk_version }}
          path: artifacts/
