<%
local fs = require "nixio.fs"
local log_file = "/tmp/vnts2.log"
local log_content = ""

if fs.access(log_file) then
    log_content = io.open(log_file, "r"):read("*all")
end
%>

<script type="text/javascript">//<![CDATA[
function clear_vnts2_log() {
    XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[clear_vnts2_log]])%>', null,
        function(x, data) {
            if (x && x.status == 200) {
                document.getElementById('vnts2_log_content').innerHTML = "日志已清空";
            }
        }
    );
}

function refresh_vnts2_log() {
    XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[get_vnts2_log]])%>', null,
        function(x, data) {
            if (x && x.status == 200) {
                document.getElementById('vnts2_log_content').innerText = data;
            }
        }
    );
}

// 每5秒自动刷新日志
setInterval(refresh_vnts2_log, 5000);
//]]>
</script>

<fieldset class="cbi-section">
    <legend><%:操作%></legend>
    <input class="cbi-button cbi-button-reset" type="button" value="<%:清空日志%>" onclick="clear_vnts2_log()" />
    <input class="cbi-button cbi-button-reload" type="button" value="<%:刷新日志%>" onclick="refresh_vnts2_log()" />
</fieldset>

<fieldset class="cbi-section">
    <legend><%:服务端日志内容%></legend>
    <pre id="vnts2_log_content" style="background-color: #f5f5f5; padding: 10px; border: 1px solid #ddd; max-height: 500px; overflow-y: auto;"><%=log_content%></pre>
</fieldset>
