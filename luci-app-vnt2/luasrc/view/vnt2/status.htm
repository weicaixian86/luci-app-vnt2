<%+header%>
<script type="text/javascript">
// 实时查询VNT2状态
function updateStatus() {
    XHR.get('<%=luci.dispatcher.build_url("admin", "network", "vnt2", "status")%>', null,
        function(x, res) {
            var statusEl = document.getElementById('vnt2-status');
            var versionEl = document.getElementById('vnt2-version');
            if (res && res.running) {
                statusEl.innerHTML = '<span style="color: green;">✓ VNT2 运行中</span>';
                versionEl.innerHTML = res.version || '未知版本';
            } else {
                statusEl.innerHTML = '<span style="color: red;">✗ VNT2 已停止</span>';
                versionEl.innerHTML = '-';
            }
        }
    );

    // 实时查询日志
    XHR.get('<%=luci.dispatcher.build_url("admin", "network", "vnt2", "log")%>', null,
        function(x, res) {
            var logEl = document.getElementById('vnt2-log');
            logEl.innerHTML = res || '暂无日志';
        }
    );

    // 刷新设备列表
    XHR.get('<%=luci.dispatcher.build_url("admin", "network", "vnt2", "list")%>', null,
        function(x, res) {
            var listEl = document.getElementById('vnt2-list');
            listEl.innerHTML = res || '暂无组网设备';
        }
    );
}

// 页面加载时刷新，之后每5秒刷新一次
window.onload = function() {
    updateStatus();
    setInterval(updateStatus, 5000);
};
</script>

<div class="cbi-map">
    <h2><%:VNT2 运行状态%></h2>
    <div class="cbi-section">
        <div class="cbi-value">
            <label class="cbi-value-title"><%:运行状态%></label>
            <div class="cbi-value-field" id="vnt2-status">加载中...</div>
        </div>
        <div class="cbi-value">
            <label class="cbi-value-title"><%:版本信息%></label>
            <div class="cbi-value-field" id="vnt2-version">-</div>
        </div>
    </div>

    <h3><%:组网设备列表%></h3>
    <div class="cbi-section">
        <pre id="vnt2-list" style="background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto;">加载中...</pre>
    </div>

    <h3><%:运行日志%></h3>
    <div class="cbi-section">
        <pre id="vnt2-log" style="background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto;">加载中...</pre>
    </div>
</div>
<%+footer%>
