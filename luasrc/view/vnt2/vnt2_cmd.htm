<div class="cbi-section">
	<h3><%:啟動參數%></h3>
	<div id="vnt2_cmd_container">
		<p><%:加載中...%></p>
	</div>
</div>
<script type="text/javascript">
function loadVnt2Cmd() {
	XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_cmd]])%>', null,
		function(x, data) {
			var container = document.getElementById('vnt2_cmd_container');
			if (data && data.cmd) {
				container.innerHTML = '<pre style="background:#f5f5f5;padding:10px;border-1px solid #ddd;border-radius:4px;overflow-x:auto;">' + data.cmd + '</pre>';
			} else {
				container.innerHTML = '<p style="color:red;"><%:無法獲取啟動參數%></p>';
			}
		}
	);
}
setTimeout(loadVnt2Cmd, 500);
XHR.poll(5, '<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_cmd]])%>', null,
	function(x, data) {
		var container = document.getElementById('vnt2_cmd_container');
		if (data && data.cmd) {
			container.innerHTML = '<pre style="background:#f5f5f5;padding:10px;border-1px solid #ddd;border-radius:4px;overflow-x:auto;">' + data.cmd + '</pre>';
		}
	}
);
</script>
