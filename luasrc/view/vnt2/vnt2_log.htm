<%+cbi/valueheader%>
<div class="cbi-value-field">
	<textarea id="vnt2_log" style="font-family:monospace;width:100%;height:400px;background:#1e1e1e;color:#d4d4d4;padding:10px;border-radius:4px;border:1px solid #444;" readonly="readonly"><%=luci.sys.exec("cat /tmp/vnt2_cli.log 2>/dev/null")%></textarea>
	<div style="margin-top:10px;">
		<input class="cbi-button cbi-button-reload" type="button" value="<%:刷新%>" onclick="XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[get_log]])%>', null, function(x, data) { document.getElementById('vnt2_log').value = data || ''; })" />
		<input class="cbi-button cbi-button-reset" type="button" value="<%:清除%>" onclick="XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[clear_log]])%>', null, function(x) { document.getElementById('vnt2_log').value = ''; })" />
	</div>
</div>
<%+cbi/valuefooter%>
