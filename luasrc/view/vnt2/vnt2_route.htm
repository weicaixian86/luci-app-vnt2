<div class="cbi-section">
	<h3><%:路由信息%></h3>
	<div id="vnt2_route_container">
		<p><%:加載中...%></p>
	</div>
</div>

<script type="text/javascript">
function loadVnt2Route() {
	XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_route]])%>', null,
		function(x, data) {
			var container = document.getElementById('vnt2_route_container');
			if (data && data.route) {
				container.innerHTML = data.route;
			} else {
				container.innerHTML = '<p style="color:red;"><%:無法獲取路由信息%></p>';
			}
		}
	);
}

setTimeout(loadVnt2Route, 500);
XHR.poll(5, '<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_route]])%>', null,
	function(x, data) {
		var container = document.getElementById('vnt2_route_container');
		if (data && data.route) {
			container.innerHTML = data.route;
		}
	}
);
</script>
