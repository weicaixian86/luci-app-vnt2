<div class="cbi-section">
	<h3><%:設備列表%></h3>
	<div id="vnt2_list_container">
		<p><%:加載中...%></p>
	</div>
</div>

<script type="text/javascript">
function loadVnt2List() {
	XHR.get('<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_list]])%>', null,
		function(x, data) {
			var container = document.getElementById('vnt2_list_container');
			if (data && data.list) {
				container.innerHTML = data.list;
			} else {
				container.innerHTML = '<p style="color:red;"><%:無法獲取設備列表%></p>';
			}
		}
	);
}

setTimeout(loadVnt2List, 500);
XHR.poll(5, '<%=url([[admin]], [[vpn]], [[vnt2]], [[vnt2_list]])%>', null,
	function(x, data) {
		var container = document.getElementById('vnt2_list_container');
		if (data && data.list) {
			container.innerHTML = data.list;
		}
	}
);
</script>
